<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kuis Jepang">
<meta name="theme-color" content="#e63946">
<link rel="manifest" href="manifest.json">
<title>Kuis Kosakata Bahasa Jepang 🎌</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e63946;
    --dark-red: #c1121f;
    --cream: #fdf8f0;
    --dark: #1a1a2e;
    --mid: #16213e;
    --accent: #f4a261;
    --green: #2ec4b6;
    --white: #fff;
    --shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    color: var(--white);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -120px; right: -120px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(230,57,70,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; left: -100px;
    width: 350px; height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(46,196,182,0.13) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Install banner */
  #install-banner {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(135deg, #e63946, #c1121f);
    color: white;
    padding: 14px 20px;
    z-index: 1000;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    animation: slideUp 0.4s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  #install-banner.show { display: flex; }
  .install-text { font-size: 0.85rem; font-weight: 600; flex: 1; }
  .install-text span { display: block; font-size: 0.75rem; opacity: 0.85; font-weight: 400; }
  .install-btn {
    background: white;
    color: var(--red);
    border: none;
    padding: 9px 18px;
    border-radius: 20px;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .install-close {
    background: transparent;
    border: none;
    color: white;
    font-size: 1.3rem;
    cursor: pointer;
    padding: 4px;
    opacity: 0.8;
  }

  header {
    text-align: center;
    padding: 40px 20px 20px;
    position: relative;
  }
  header .flag { font-size: 2.5rem; display: block; margin-bottom: 6px; }
  header h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #e63946, #f4a261);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p { color: #aaa; font-size: 0.95rem; margin-top: 6px; }

  #mode-selector {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 16px 20px;
    flex-wrap: wrap;
  }
  .mode-btn {
    padding: 10px 22px;
    border-radius: 30px;
    border: 2px solid #333;
    background: transparent;
    color: #aaa;
    font-family: 'Poppins', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mode-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

  #progress-area {
    max-width: 620px;
    margin: 0 auto;
    padding: 0 24px 10px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: #888;
    margin-bottom: 6px;
  }
  .progress-bar-bg {
    height: 7px;
    background: #2a2a4a;
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--accent));
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  #score-bar {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 6px 20px 16px;
  }
  .score-item { text-align: center; }
  .score-num { font-size: 1.6rem; font-weight: 800; }
  .score-label { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .score-correct .score-num { color: var(--green); }
  .score-wrong .score-num { color: var(--red); }
  .score-total .score-num { color: var(--accent); }

  #quiz-area {
    max-width: 620px;
    margin: 0 auto 100px;
    padding: 0 20px;
  }
  .quiz-card {
    background: linear-gradient(145deg, #1e2040, #252550);
    border: 1px solid #333;
    border-radius: 22px;
    padding: 36px 30px 28px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    animation: slideIn 0.35s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .quiz-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--red), var(--accent));
  }

  .question-tag {
    display: inline-block;
    background: rgba(230,57,70,0.15);
    color: var(--red);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .question-jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 2.4rem;
    font-weight: 700;
    text-align: center;
    margin: 10px 0 4px;
    letter-spacing: 2px;
  }
  .question-romaji {
    text-align: center;
    color: #aaa;
    font-size: 1rem;
    margin-bottom: 28px;
    font-style: italic;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 480px) { .options-grid { grid-template-columns: 1fr; } }

  .option-btn {
    padding: 14px 16px;
    border-radius: 14px;
    border: 2px solid #333;
    background: #1a1a35;
    color: #ddd;
    font-family: 'Poppins', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    line-height: 1.4;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(244,162,97,0.1);
    color: var(--white);
    transform: translateY(-2px);
  }
  .option-btn.correct {
    border-color: var(--green);
    background: rgba(46,196,182,0.15);
    color: var(--green);
    animation: pulse-green 0.4s ease;
  }
  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(230,57,70,0.12);
    color: var(--red);
    animation: shake 0.35s ease;
  }
  @keyframes pulse-green {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-6px); }
    75%     { transform: translateX(6px); }
  }
  .option-btn:disabled { cursor: default; }

  #feedback {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: 600;
    display: none;
    align-items: center;
    gap: 10px;
  }
  #feedback.show { display: flex; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  #feedback.correct-fb { background: rgba(46,196,182,0.15); color: var(--green); }
  #feedback.wrong-fb   { background: rgba(230,57,70,0.12); color: #ff6b7a; }
  #feedback .fb-icon { font-size: 1.3rem; }

  #next-btn {
    display: block;
    margin: 22px auto 0;
    padding: 14px 44px;
    border-radius: 50px;
    background: linear-gradient(90deg, var(--red), var(--dark-red));
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(230,57,70,0.35);
    transition: all 0.2s;
    display: none;
  }
  #next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(230,57,70,0.5); }
  #next-btn.visible { display: block; animation: fadeIn 0.3s ease; }

  #result-screen {
    max-width: 560px;
    margin: 30px auto 100px;
    padding: 0 20px;
    text-align: center;
    display: none;
    animation: slideIn 0.4s ease;
  }
  .result-card {
    background: linear-gradient(145deg, #1e2040, #252550);
    border: 1px solid #333;
    border-radius: 24px;
    padding: 44px 32px;
    box-shadow: var(--shadow);
  }
  .result-emoji { font-size: 4rem; display: block; margin-bottom: 10px; }
  .result-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 6px; }
  .result-sub { color: #aaa; font-size: 0.95rem; margin-bottom: 28px; }
  .result-score-big {
    font-size: 4.5rem;
    font-weight: 800;
    background: linear-gradient(90deg, #e63946, #f4a261);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 4px;
  }
  .result-score-label { color: #888; font-size: 0.85rem; margin-bottom: 28px; }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-bottom: 30px;
  }
  .rs { text-align: center; }
  .rs-num { font-size: 1.6rem; font-weight: 700; }
  .rs-lbl { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .restart-btn {
    padding: 14px 48px;
    border-radius: 50px;
    background: linear-gradient(90deg, var(--red), var(--dark-red));
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(230,57,70,0.35);
    transition: all 0.2s;
    margin: 6px;
  }
  .restart-btn:hover { transform: translateY(-2px); }
  .restart-btn.secondary {
    background: transparent;
    border: 2px solid #444;
    color: #aaa;
    box-shadow: none;
  }
  .restart-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }

  .flashcard { perspective: 1000px; cursor: pointer; }
  .flashcard-inner {
    position: relative;
    width: 100%;
    min-height: 200px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.4,2,.6,1);
  }
  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
  .flashcard-front, .flashcard-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    border-radius: 18px;
    min-height: 200px;
  }
  .flashcard-front { background: linear-gradient(145deg,#252550,#1a1a35); }
  .flashcard-back { background: linear-gradient(145deg,#1a3540,#0f2530); transform: rotateY(180deg); }
  .fc-hint { color: #666; font-size: 0.78rem; margin-top: 14px; letter-spacing: 1px; }
  .fc-meaning { font-size: 1.4rem; font-weight: 700; color: var(--green); }
  .fc-nav { display: flex; justify-content: center; gap: 16px; margin-top: 18px; }
  .fc-btn {
    padding: 10px 28px;
    border-radius: 30px;
    border: 2px solid #444;
    background: transparent;
    color: #aaa;
    font-family: 'Poppins', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .fc-btn:hover { border-color: var(--accent); color: var(--accent); }

  .type-input {
    width: 100%;
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 12px;
    border: 2px solid #333;
    background: #1a1a35;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border 0.2s;
  }
  .type-input:focus { border-color: var(--accent); }
  .type-submit {
    margin-top: 14px;
    padding: 12px 36px;
    border-radius: 30px;
    background: linear-gradient(90deg,var(--red),var(--dark-red));
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }
  .type-submit:hover { transform: translateY(-2px); }
</style>
</head>
<body>

<!-- Install Banner -->
<div id="install-banner">
  <div class="install-text">
    📱 Install Aplikasi Kuis Jepang
    <span>Simpan di home screen, bisa pakai offline!</span>
  </div>
  <button class="install-btn" id="install-btn">Install</button>
  <button class="install-close" onclick="closeBanner()">✕</button>
</div>

<header>
  <span class="flag">🎌</span>
  <h1>Kuis Kosakata Jepang</h1>
  <p>Kata Kerja (Verba) — Bahasa Indonesia</p>
</header>

<div id="mode-selector">
  <button class="mode-btn active" onclick="setMode('pilihan-ganda')">📝 Pilihan Ganda</button>
  <button class="mode-btn" onclick="setMode('flashcard')">🃏 Flashcard</button>
  <button class="mode-btn" onclick="setMode('ketik')">⌨️ Ketik Jawaban</button>
</div>

<div id="progress-area">
  <div class="progress-info">
    <span id="progress-text">Soal 1 dari 65</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div id="score-bar">
  <div class="score-item score-correct"><div class="score-num" id="sc-correct">0</div><div class="score-label">Benar</div></div>
  <div class="score-item score-total"><div class="score-num" id="sc-total">0</div><div class="score-label">Dijawab</div></div>
  <div class="score-item score-wrong"><div class="score-num" id="sc-wrong">0</div><div class="score-label">Salah</div></div>
</div>

<div id="quiz-area"></div>
<div id="result-screen"></div>

<script>
// ===== PWA INSTALL =====
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    closeBanner();
  }
});
window.addEventListener('appinstalled', () => { closeBanner(); });
function closeBanner() {
  document.getElementById('install-banner').classList.remove('show');
}

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.log('SW error:', err));
  });
}

// ===== VOCAB DATA =====
const vocab = [
  {jp:"べんきょうします", romaji:"benkyou shimasu", id:"belajar sendiri"},
  {jp:"れんしゅうします", romaji:"renshuu shimasu", id:"berlatih"},
  {jp:"しります", romaji:"shirimasu", id:"mengetahui"},
  {jp:"はたらきます", romaji:"hatarakimasu", id:"bekerja"},
  {jp:"やすみます", romaji:"yasumimasu", id:"istirahat / libur"},
  {jp:"きゅうけいします", romaji:"kyuukei shimasu", id:"istirahat sejenak"},
  {jp:"おしえます", romaji:"oshiemasu", id:"mengajar / memberitahu"},
  {jp:"ならびます", romaji:"narabimasu", id:"belajar bersama"},
  {jp:"しつもんします", romaji:"shitsumon shimasu", id:"bertanya"},
  {jp:"わかります", romaji:"wakarimasu", id:"mengerti"},
  {jp:"おぼえます", romaji:"oboemasu", id:"mengingat"},
  {jp:"わすれます", romaji:"wasuremasu", id:"lupa"},
  {jp:"しらべます", romaji:"shirabemasu", id:"memeriksa / mencari tahu"},
  {jp:"はじめます", romaji:"hajimemasu", id:"mulai"},
  {jp:"おわります", romaji:"owarimasu", id:"selesai"},
  {jp:"みせます", romaji:"misemasu", id:"memperlihatkan"},
  {jp:"かきます", romaji:"kakimasu", id:"menulis"},

  {jp:"みます", romaji:"mimasu", id:"melihat"},
  {jp:"おきます (bangun)", romaji:"okimasu", id:"bangun tidur"},
  {jp:"ねます", romaji:"nemasu", id:"tidur"},
  {jp:"いきます", romaji:"ikimasu", id:"pergi"},

  {jp:"まなびます", romaji:"manabimasu", id:"belajar (mendalami)"},
  {jp:"おもいだします", romaji:"omoidashimasu", id:"mengingat kembali"},
  {jp:"せんたくします", romaji:"sentaku shimasu", id:"mencuci baju"},
  {jp:"でかけます", romaji:"dekakemasu", id:"keluar rumah"},
];

let mode = 'pilihan-ganda';
let currentIdx = 0;
let shuffled = [];
let correct = 0, wrong = 0, answered = 0;
let fcIndex = 0;
let answered_current = false;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['pilihan-ganda','flashcard','ketik'][i]===m);
  });
  startQuiz();
}

function startQuiz() {
  shuffled = shuffle(vocab);
  currentIdx = 0; fcIndex = 0;
  correct = 0; wrong = 0; answered = 0;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  updateScore();
  if(mode==='flashcard') renderFlashcard();
  else renderQuestion();
}

function updateScore() {
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-total').textContent = answered;
  const total = shuffled.length;
  const pct = Math.round((currentIdx / total)*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-pct').textContent = pct+'%';
  document.getElementById('progress-text').textContent = `Soal ${Math.min(currentIdx+1,total)} dari ${total}`;
}

function getWrongOptions(correct_item) {
  const others = vocab.filter(v => v.jp !== correct_item.jp);
  return shuffle(others).slice(0,3);
}

function renderQuestion() {
  if(mode === 'ketik') { renderTypeQuestion(); return; }
  answered_current = false;
  if(currentIdx >= shuffled.length) { showResult(); return; }
  const q = shuffled[currentIdx];
  const wrongs = getWrongOptions(q);
  const options = shuffle([q, ...wrongs]);
  const qtype = Math.random() > 0.5 ? 'jp2id' : 'id2jp';

  let html = `<div class="quiz-card">
    <span class="question-tag">Soal ${currentIdx+1} / ${shuffled.length}</span>`;

  if(qtype === 'jp2id') {
    html += `<div class="question-jp">${q.jp}</div>
    <div class="question-romaji">${q.romaji}</div>
    <p style="color:#888;font-size:.8rem;text-align:center;margin-bottom:16px;">Artinya dalam bahasa Indonesia?</p>`;
    html += `<div class="options-grid">`;
    options.forEach(opt => {
      html += `<button class="option-btn" onclick="checkAnswer(this,'${opt.jp}','${q.jp}')">${opt.id}</button>`;
    });
  } else {
    html += `<div style="text-align:center;margin:10px 0 28px;">
      <p style="color:#888;font-size:.85rem;margin-bottom:8px;">Kata Jepang untuk:</p>
      <p style="font-size:1.5rem;font-weight:800;color:var(--accent)">${q.id}</p>
    </div>`;
    html += `<div class="options-grid">`;
    options.forEach(opt => {
      html += `<button class="option-btn" onclick="checkAnswer(this,'${opt.jp}','${q.jp}')">
        <span style="font-family:'Noto Sans JP',sans-serif;font-size:1.1rem">${opt.jp}</span><br>
        <span style="font-size:0.78rem;color:#888;font-style:italic">${opt.romaji}</span>
      </button>`;
    });
  }

  html += `</div><div id="feedback"></div></div>
  <button id="next-btn" onclick="nextQuestion()">Soal Berikutnya →</button>`;
  document.getElementById('quiz-area').innerHTML = html;
}

function checkAnswer(btn, chosen, correct_jp) {
  if(answered_current) return;
  answered_current = true;
  answered++;
  const isCorrect = chosen === correct_jp;
  if(isCorrect) correct++; else wrong++;
  updateScore();

  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    const val = b.getAttribute('onclick');
    if(val && val.includes(`'${correct_jp}'`)) b.classList.add('correct');
    else if(b === btn && !isCorrect) b.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  const q = shuffled[currentIdx];
  if(isCorrect) {
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = `<span class="fb-icon">✅</span> <span>Benar! <b>${q.jp}</b> = ${q.id}</span>`;
  } else {
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = `<span class="fb-icon">❌</span> <span>Jawaban benar: <b>${q.jp}</b> (${q.romaji}) = <b>${q.id}</b></span>`;
  }
  document.getElementById('next-btn').classList.add('visible');
}

function nextQuestion() {
  currentIdx++;
  updateScore();
  renderQuestion();
}

function renderFlashcard() {
  if(fcIndex >= shuffled.length) { showResult(); return; }
  const q = shuffled[fcIndex];
  const html = `<div class="quiz-card">
    <span class="question-tag">Kartu ${fcIndex+1} / ${shuffled.length}</span>
    <div class="flashcard" id="fc" onclick="flipCard()">
      <div class="flashcard-inner">
        <div class="flashcard-front">
          <div class="question-jp">${q.jp}</div>
          <div class="question-romaji">${q.romaji}</div>
          <div class="fc-hint">👆 Klik untuk lihat arti</div>
        </div>
        <div class="flashcard-back">
          <div class="fc-meaning">${q.id}</div>
          <div class="question-romaji" style="margin-top:8px">${q.romaji}</div>
          <div class="fc-hint">🔄 Klik untuk balik lagi</div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="fc-btn" onclick="fcNav(-1)">← Sebelumnya</button>
      <button class="fc-btn" style="border-color:var(--red);color:var(--red)" onclick="fcNav(1)">Selanjutnya →</button>
    </div>
  </div>`;
  document.getElementById('quiz-area').innerHTML = html;
}

function flipCard() { document.getElementById('fc').classList.toggle('flipped'); }
function fcNav(dir) {
  fcIndex = Math.max(0, Math.min(shuffled.length-1, fcIndex+dir));
  currentIdx = fcIndex;
  updateScore();
  renderFlashcard();
  if(fcIndex === shuffled.length-1 && dir===1) setTimeout(showResult, 400);
}

function renderTypeQuestion() {
  answered_current = false;
  if(currentIdx >= shuffled.length) { showResult(); return; }
  const q = shuffled[currentIdx];
  const html = `<div class="quiz-card">
    <span class="question-tag">Soal ${currentIdx+1} / ${shuffled.length}</span>
    <div class="question-jp">${q.jp}</div>
    <div class="question-romaji">${q.romaji}</div>
    <p style="color:#888;font-size:.82rem;text-align:center;margin-bottom:4px">Tulis artinya dalam Bahasa Indonesia:</p>
    <input class="type-input" id="type-ans" placeholder="Ketik jawaban di sini..." autocomplete="off" onkeydown="if(event.key==='Enter')checkType()">
    <button class="type-submit" onclick="checkType()">Jawab ✓</button>
    <div id="feedback"></div>
  </div>
  <button id="next-btn" onclick="nextQuestion()">Soal Berikutnya →</button>`;
  document.getElementById('quiz-area').innerHTML = html;
  document.getElementById('type-ans').focus();
}

function checkType() {
  if(answered_current) return;
  const input = document.getElementById('type-ans');
  const userAns = input.value.trim().toLowerCase();
  if(!userAns) return;
  answered_current = true;
  answered++;
  const q = shuffled[currentIdx];
  const correctAns = q.id.toLowerCase();
  const keywords = correctAns.split(/[\/\s,]+/).filter(k=>k.length>2);
  const isCorrect = keywords.some(k => userAns.includes(k)) || userAns.includes(correctAns);
  if(isCorrect) correct++; else wrong++;
  updateScore();
  input.disabled = true;
  input.style.borderColor = isCorrect ? 'var(--green)' : 'var(--red)';
  const fb = document.getElementById('feedback');
  if(isCorrect) {
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = `<span class="fb-icon">✅</span> <span>Benar! Jawaban: <b>${q.id}</b></span>`;
  } else {
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = `<span class="fb-icon">❌</span> <span>Jawaban benar: <b>${q.id}</b></span>`;
  }
  document.getElementById('next-btn').classList.add('visible');
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  const pct = Math.round((correct / shuffled.length) * 100);
  let emoji = '🎉', title = 'Luar Biasa!';
  if(pct < 50) { emoji = '😓'; title = 'Ayo Semangat!'; }
  else if(pct < 75) { emoji = '👍'; title = 'Bagus!'; }
  else if(pct < 90) { emoji = '🌟'; title = 'Hebat!'; }
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';
  rs.innerHTML = `<div class="result-card">
    <span class="result-emoji">${emoji}</span>
    <div class="result-title">${title}</div>
    <div class="result-sub">Kamu telah menyelesaikan semua soal!</div>
    <div class="result-score-big">${pct}%</div>
    <div class="result-score-label">Tingkat Keberhasilan</div>
    <div class="result-stats">
      <div class="rs"><div class="rs-num" style="color:var(--green)">${correct}</div><div class="rs-lbl">Benar</div></div>
      <div class="rs"><div class="rs-num" style="color:var(--red)">${wrong}</div><div class="rs-lbl">Salah</div></div>
      <div class="rs"><div class="rs-num" style="color:var(--accent)">${shuffled.length}</div><div class="rs-lbl">Total</div></div>
    </div>
    <button class="restart-btn" onclick="startQuiz()">🔄 Ulangi Kuis</button>
    <button class="restart-btn secondary" onclick="setMode('flashcard')">🃏 Review Flashcard</button>
  </div>`;
}

window.onload = startQuiz;
</script>
</body>
</html>
